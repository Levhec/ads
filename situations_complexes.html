<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<style>
/* ===== FLOATING BUTTONS CORRIGÉS ===== */

.floating-actions{
  position:fixed;
  right:18px;
  bottom:18px;
  z-index:120;
  display:flex;
  flex-direction:column;
  gap:10px;
}

/* Boutons ronds (PLUS DE TEXTE) */
.floating-btn{
  display:flex;
  align-items:center;
  justify-content:center;
  width:54px;
  height:54px;
  border-radius:50%;
  background:rgba(35,35,35,.96);
  color:#fff;
  border:1px solid rgba(255,255,255,.08);
  box-shadow:0 14px 30px rgba(0,0,0,.22);
  transition:.25s ease;
  backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);
}

/* Hover propre */
.floating-btn:hover{
  transform:translateY(-2px) scale(1.04);
}

/* Styles spécifiques */
.floating-btn.offer{
  background:linear-gradient(135deg, #2b2b2b 0%, #3a3226 100%);
}

.floating-btn.contact{
  background:linear-gradient(180deg, #c39b60 0%, #9b7847 100%);
}

.floating-btn.phone{
  background:linear-gradient(135deg, #1f1f1f 0%, #2a2a2a 100%);
}

/* Icônes seules */
.floating-icon{
  font-size:1.2rem;
  line-height:1;
}

/* ===== MOBILE ===== */
@media (max-width: 720px){

  .floating-actions{
    right:10px;
    bottom:10px;
    gap:8px;
  }

  .floating-btn{
    width:50px;
    height:50px;
  }
}

</style>
</head>

<body>

<!-- ===== BOUTONS FLOTTANTS ===== -->
<div class="floating-actions">

  <!-- Offre -->
  <a class="floating-btn offer"
     href="/popups/popup-offre-situations-complexes.html"
     aria-label="Voir l’offre">
    <span class="floating-icon">★</span>
  </a>

  <!-- Contact -->
  <a class="floating-btn contact popup-link"
     href="/popups/popup-contact.html"
     aria-label="Être contacté">
    <span class="floating-icon">✉</span>
  </a>

  <!-- Téléphone -->
  <a class="floating-btn phone"
     href="tel:+33184200660"
     aria-label="Téléphoner">
    <span class="floating-icon">☎</span>
  </a>

</div>

<script>
function openPopupWindow(url) {
  const width = Math.min(620, window.innerWidth - 24);
  const height = Math.min(760, window.innerHeight - 24);
  const left = Math.max(12, (window.screen.width - width) / 2);
  const top = Math.max(12, (window.screen.height - height) / 2);

  window.open(
    url,
    'levhecPopup',
    `width=${width},height=${height},left=${left},top=${top},resizable=yes,scrollbars=yes`
  );
}

document.querySelectorAll('.popup-link').forEach(link => {
  link.addEventListener('click', function(e) {
    if (window.innerWidth > 768) {
      e.preventDefault();
      openPopupWindow(this.getAttribute('href'));
    }
  });
});
</script>

</body>
</html>
