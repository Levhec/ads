<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
}

/* CONTENEUR GLOBAL */
.popup-wrapper{
  position:relative;
  max-width:500px;
  margin:40px auto;
}

/* BLOC POPUP */
.popup-content{
  background:#2b2b2b;
  color:#ece8df;
  padding:25px;
  border-radius:12px;
}

/* TITRE */
.popup-content h2{
  margin-top:0;
  text-align:center;
}

/* TEXTE */
.popup-content p{
  text-align:center;
  color:#cfc8bb;
}

/* FORM */
.popup-content label{
  display:block;
  margin-top:15px;
  font-size:14px;
}

.popup-content input,
.popup-content textarea{
  width:100%;
  padding:10px;
  margin-top:5px;
  border:none;
  border-radius:6px;
}

.popup-content textarea{
  min-height:100px;
}

/* BOUTON */
.popup-content button[type="submit"]{
  margin-top:20px;
  width:100%;
  padding:12px;
  background:#c9a15d;
  border:none;
  border-radius:8px;
  color:#1f1f1f;
  font-weight:600;
  cursor:pointer;
}

/* CROIX PREMIUM (hors bloc) */
.popup-close{
  position:absolute;
  top:-12px;
  right:-12px;
  width:36px;
  height:36px;
  border:none;
  border-radius:50%;
  background:#2b2b2b;
  color:#fff;
  font-size:20px;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:0 8px 20px rgba(0,0,0,.4);
  border:1px solid rgba(255,255,255,.1);
}

.popup-close:hover{
  transform:scale(1.05);
  background:#3a3a3a;
}
</style>
</head>

<body>

<div class="popup-wrapper">

  <!-- CROIX -->
  <button class="popup-close" onclick="parent.closePopup()">×</button>

  <!-- POPUP -->
  <div class="popup-content">

    <h2>Être contacté</h2>
    <p>Laissez-nous vos coordonnées. Nous reviendrons vers vous rapidement.</p>

    <form action="https://api.web3forms.com/submit" method="POST">
      <input type="hidden" name="access_key" value="b1bae4e8-d6eb-4c38-94a8-09289895db0f">
      <input type="hidden" name="subject" value="Demande contrôle de gestion LEVHEC">
      <input type="hidden" name="offre" value="Contrôle de gestion">
      <input type="hidden" name="page_url" id="page_url">

      <label for="nom">Nom</label>
      <input type="text" id="nom" name="nom" autocomplete="name" required>

      <label for="entreprise">Entreprise</label>
      <input type="text" id="entreprise" name="entreprise" autocomplete="organization">

      <label for="email">Email</label>
      <input type="email" id="email" name="email" autocomplete="email" required>

      <label for="telephone">Téléphone</label>
      <input type="tel" id="telephone" name="telephone" autocomplete="tel">

      <label for="message">Votre besoin</label>
      <textarea id="message" name="message" required></textarea>

      <button type="submit">Envoyer la demande</button>
    </form>

  </div>
</div>

</body>
</html>
