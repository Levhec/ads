<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Palette couleurs — LEVHEC</title>

<style>

body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:#f5f5f5;
    color:#1d1d1d;
}

.container{
    max-width:1200px;
    margin:auto;
    padding:40px 20px;
}

h1{
    margin-bottom:30px;
}

.palette{
    margin-bottom:50px;
}

.palette h2{
    margin-bottom:15px;
}

.colors{
    display:flex;
    flex-wrap:wrap;
    gap:15px;
}

.color{
    width:180px;
    height:120px;
    border-radius:10px;
    display:flex;
    align-items:flex-end;
    padding:10px;
    color:#fff;
    font-size:14px;
    box-shadow:0 8px 20px rgba(0,0,0,0.08);
}

.light{
    color:#1d1d1d;
}

</style>
</head>

<body>

<div class="container">

<h1>Test palettes — Contextes & Situations</h1>

<!-- BLEU PETROLE -->
<div class="palette">
<h2>Bleu pétrole</h2>
<div class="colors">
<div class="color" style="background:#1F3A44">#1F3A44</div>
<div class="color" style="background:#162A31">#162A31</div>
<div class="color light" style="background:#EAF1F3">#EAF1F3</div>
<div class="color light" style="background:#B7C9CE">#B7C9CE</div>
</div>
</div>

<!-- ANTHRACITE -->
<div class="palette">
<h2>Anthracite bleuté</h2>
<div class="colors">
<div class="color" style="background:#2F343A">#2F343A</div>
<div class="color" style="background:#23272C">#23272C</div>
<div class="color light" style="background:#F2F4F5">#F2F4F5</div>
<div class="color light" style="background:#D0D5D8">#D0D5D8</div>
</div>
</div>

<!-- VERT PROFOND -->
<div class="palette">
<h2>Vert profond</h2>
<div class="colors">
<div class="color" style="background:#2E4A3F">#2E4A3F</div>
<div class="color" style="background:#223730">#223730</div>
<div class="color light" style="background:#EEF4F2">#EEF4F2</div>
<div class="color light" style="background:#C2D4CF">#C2D4CF</div>
</div>
</div>

<!-- JAUNES / OR -->
<div class="palette">
<h2>Jaunes / Or (accents & CTA)</h2>
<div class="colors">
<div class="color light" style="background:#D7B16B">#D7B16B</div>
<div class="color light" style="background:#E6C98F">#E6C98F</div>
<div class="color light" style="background:#C9A24A">#C9A24A</div>
<div class="color light" style="background:#F4D47C">#F4D47C</div>
<div class="color light" style="background:#B8963E">#B8963E</div>
</div>
</div>

</div>

</body>
</html>
