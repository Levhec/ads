<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Être contacté | LEVHEC ADVISORY</title>

  <style>
    body{
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
      background:#2b2b2b;
      color:#ece8df;
      display:flex;
      justify-content:center;
      align-items:center;
      min-height:100vh;
      padding:20px;
    }

    .container{
      width:100%;
      max-width:420px;
      background:#1f1f1f;
      padding:28px 22px;
      border-radius:16px;
      box-shadow:0 20px 50px rgba(0,0,0,0.4);
    }

    h1{
      margin:0 0 10px;
      font-size:24px;
      text-align:center;
    }

    p{
      margin:0 0 20px;
      text-align:center;
      color:#cfc8bb;
      font-size:14px;
    }

    form{
      display:flex;
      flex-direction:column;
      gap:12px;
    }

    input, textarea{
      width:100%;
      padding:14px;
      border-radius:8px;
      border:1px solid rgba(255,255,255,0.1);
      background:#2b2b2b;
      color:#ece8df;
      font-size:16px; /* évite zoom iPhone */
    }

    textarea{
      min-height:110px;
      resize:vertical;
    }

    input:focus, textarea:focus{
      outline:none;
      border-color:#c9a15d;
    }

    button{
      margin-top:10px;
      padding:16px;
      border:none;
      border-radius:10px;
      background:#c9a15d;
      color:#fff;
      font-size:16px;
      cursor:pointer;
      position:sticky;
      bottom:0;
    }

    button:hover{
      background:#a88345;
    }

    .back{
      display:block;
      margin-top:16px;
      text-align:center;
      font-size:13px;
      color:#cfc8bb;
      text-decoration:none;
    }

    .back:hover{
      text-decoration:underline;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>Être contacté</h1>
    <p>Nous revenons vers vous rapidement.</p>

    <form action="https://api.web3forms.com/submit" method="POST">
      <input type="hidden" name="access_key" value="b1bae4e8-d6eb-4c38-94a8-09289895db0f">
      <input type="hidden" name="subject" value="Demande de contact LEVHEC">
      <input type="hidden" name="page_url" id="page_url">

      <input type="text" name="nom" placeholder="Nom" autocomplete="name" required>
      <input type="text" name="entreprise" placeholder="Entreprise">
      <input type="email" name="email" placeholder="E-mail" autocomplete="email" required>
      <input type="tel" name="telephone" placeholder="Téléphone" autocomplete="tel">
      <textarea name="message" placeholder="Votre besoin"></textarea>

      <button type="submit">Envoyer</button>
    </form>

    <a class="back" href="/">← Retour aux offres</a>
  </div>

  <script>
    document.getElementById('page_url').value = window.location.href;
  </script>

</body>
</html>
