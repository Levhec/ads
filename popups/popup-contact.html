<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  background:transparent;
}

.popup-content{
  background:#2b2b2b;
  color:#ece8df;
  padding:25px;
  border-radius:12px;
  max-width:500px;
  margin:auto;
  box-sizing:border-box;
}

.popup-content h2{
  margin:0 0 10px 0;
  text-align:center;
  font-size:28px;
  line-height:1.2;
}

.popup-content p{
  margin:0 0 20px 0;
  text-align:center;
  color:#cfc8bb;
  line-height:1.5;
}

.popup-content label{
  display:block;
  margin-top:15px;
  font-size:14px;
}

.popup-content input,
.popup-content textarea{
  width:100%;
  padding:10px;
  margin-top:5px;
  border:none;
  border-radius:6px;
  box-sizing:border-box;
}

.popup-content textarea{
  min-height:100px;
  resize:vertical;
}

.popup-content button[type="submit"]{
  margin-top:20px;
  width:100%;
  padding:12px;
  background:#c9a15d;
  border:none;
  border-radius:8px;
  color:#1f1f1f;
  font-weight:600;
  cursor:pointer;
}

.popup-content button[type="submit"]:hover{
  background:#d4ad6b;
}

@media (max-width: 600px){
  .popup-content{
    padding:20px;
    border-radius:10px;
  }

  .popup-content h2{
    font-size:24px;
  }
}
</style>
</head>

<body>

<div class="popup-content">
  <h2>Être contacté</h2>
  <p>Laissez-nous vos coordonnées. Nous reviendrons vers vous rapidement.</p>

  <form action="https://api.web3forms.com/submit" method="POST">
    <input type="hidden" name="access_key" value="b1bae4e8-d6eb-4c38-94a8-09289895db0f">
    <input type="hidden" name="subject" value="Demande contrôle de gestion LEVHEC">
    <input type="hidden" name="offre" value="Contrôle de gestion">
    <input type="hidden" name="page_url" id="page_url">

    <label for="nom">Nom</label>
    <input type="text" id="nom" name="nom" autocomplete="name" required>

    <label for="entreprise">Entreprise</label>
    <input type="text" id="entreprise" name="entreprise" autocomplete="organization">

    <label for="email">Email</label>
    <input type="email" id="email" name="email" autocomplete="email" required>

    <label for="telephone">Téléphone</label>
    <input type="tel" id="telephone" name="telephone" autocomplete="tel">

    <label for="message">Votre besoin</label>
    <textarea id="message" name="message" required></textarea>

    <button type="submit">Envoyer la demande</button>
  </form>
</div>

<script>
document.getElementById("page_url").value = document.referrer || window.location.href;
</script>

</body>
</html>
