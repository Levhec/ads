<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test Lilas</title>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  display:flex;
  height:100vh;
}

/* BLOCS */
.block{
  flex:1;
  display:flex;
  align-items:center;
  justify-content:center;
  color:#f4f1ea;
  text-align:center;
}

/* OPTION 1 */
.lilas1{
  background:
    linear-gradient(160deg, #140f20 0%, #2a1f3d 50%, #3a2c5c 100%);
}

/* OPTION 2 */
.lilas2{
  background:
    linear-gradient(160deg, #151022 0%, #2c2242 50%, #3f2f66 100%);
}

/* OPTION 3 */
.lilas3{
  background:
    linear-gradient(160deg, #141226 0%, #2a2440 50%, #3a3570 100%);
}

h2{
  margin:0 0 10px;
  color:#d7b16b;
}
</style>

</head>
<body>

<div class="block lilas1">
  <div>
    <h2>Option 1</h2>
    <p>Lilas élégant</p>
  </div>
</div>

<div class="block lilas2">
  <div>
    <h2>Option 2</h2>
    <p>Lilas profond</p>
  </div>
</div>

<div class="block lilas3">
  <div>
    <h2>Option 3</h2>
    <p>Lilas bleuté</p>
  </div>
</div>

</body>
</html>
