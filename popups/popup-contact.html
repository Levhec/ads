<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
}

.popup-content{
  position:relative;
  background:#2b2b2b;
  color:#ece8df;
  padding:25px;
  border-radius:12px;
  max-width:500px;
  margin:auto;
}

.popup-content h2{
  margin-top:0;
  text-align:center;
}

.popup-content p{
  text-align:center;
  color:#cfc8bb;
}

.popup-content label{
  display:block;
  margin-top:15px;
  font-size:14px;
}

.popup-content input,
.popup-content textarea{
  width:100%;
  padding:10px;
  margin-top:5px;
  border:none;
  border-radius:6px;
}

.popup-content textarea{
  min-height:100px;
}

.popup-content button[type="submit"]{
  margin-top:20px;
  width:100%;
  padding:12px;
  background:#c9a15d;
  border:none;
  border-radius:8px;
  color:#1f1f1f;
  font-weight:600;
  cursor:pointer;
}

/* CROIX */
.popup-close{
  position:absolute;
  top:10px;
  right:10px;
  width:34px;
  height:34px;
  border:none;
  border-radius:50%;
  background:rgba(255,255,255,.08);
  color:#fff;
  font-size:20px;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
}

.popup-close:hover{
  background:rgba(255,255,255,.15);
}
</style>
</head>

<body>

<div class="popup-content">

  <button class="popup-close" onclick="parent.closePopup()">×</button>

  <h2>Être contacté</h2>
  <p>Laissez-nous vos coordonnées. Nous reviendrons vers vous rapidement.</p>

  <form action="https://api.web3forms.com/submit" method="POST">
    <input type="hidden" name="access_key" value="b1bae4e8-d6eb-4c38-94a8-09289895db0f">
    <input type="hidden" name="subject" value="Demande contrôle de gestion LEVHEC">
    <input type="hidden" name="offre" value="Contrôle de gestion">
    <input type="hidden" name="page_url" id="page_url">

    <label for="nom">Nom</label>
    <input type="text" id="nom" name="nom" autocomplete="name" required>

    <label for="entreprise">Entreprise</label>
    <input type="text" id="entreprise" name="entreprise" autocomplete="organization">

    <label for="email">Email</label>
    <input type="email" id="email" name="email" autocomplete="email" required>

    <label for="telephone">Téléphone</label>
    <input type="tel" id="telephone" name="telephone" autocomplete="tel">

    <label for="message">Votre besoin</label>
    <textarea id="message" name="message" required></textarea>

    <button type="submit">Envoyer la demande</button>
  </form>

</div>

</body>
</html>
