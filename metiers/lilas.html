<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test Rouges - Contrôle de gestion</title>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  display:grid;
  grid-template-columns:repeat(3, 1fr);
  min-height:100vh;
}

.block{
  display:flex;
  align-items:center;
  justify-content:center;
  color:#f4f1ea;
  text-align:center;
  padding:24px;
}

.inner{
  padding:28px 22px;
  border-radius:20px;
  background:rgba(255,255,255,0.08);
  border:1px solid rgba(255,255,255,0.14);
  width:min(260px, 100%);
}

h2{
  margin:0 0 10px;
  color:#d7b16b;
  font-size:24px;
}

p{
  margin:6px 0;
  opacity:0.9;
  font-size:15px;
}

/* 1 — Bordeaux classique */
.c1{
  background:
    linear-gradient(160deg, #241015 0%, #4a1f2d 50%, #6b3244 100%);
}

/* 2 — Lie-de-vin profond */
.c2{
  background:
    linear-gradient(160deg, #1d0d12 0%, #3c1824 50%, #5b2437 100%);
}

/* 3 — Rouge brun structuré */
.c3{
  background:
    linear-gradient(160deg, #23110f 0%, #4a231c 50%, #6b392d 100%);
}

/* 4 — Bordeaux prune */
.c4{
  background:
    linear-gradient(160deg, #21101a 0%, #412038 50%, #633056 100%);
}

/* 5 — Rouge acajou */
.c5{
  background:
    linear-gradient(160deg, #22110d 0%, #4b2419 50%, #733829 100%);
}

/* 6 — Lie-de-vin premium */
.c6{
  background:
    linear-gradient(160deg, #190c10 0%, #351722 50%, #55263a 100%);
}

@media (max-width: 900px){
  body{
    grid-template-columns:1fr 1fr;
  }
}

@media (max-width: 640px){
  body{
    grid-template-columns:1fr;
  }
}
</style>
</head>
<body>

<div class="block c1">
  <div class="inner">
    <h2>Option 1</h2>
    <p>Bordeaux classique</p>
    <p>#4a1f2d</p>
  </div>
</div>

<div class="block c2">
  <div class="inner">
    <h2>Option 2</h2>
    <p>Lie-de-vin profond</p>
    <p>#3c1824</p>
  </div>
</div>

<div class="block c3">
  <div class="inner">
    <h2>Option 3</h2>
    <p>Rouge brun structuré</p>
    <p>#4a231c</p>
  </div>
</div>

<div class="block c4">
  <div class="inner">
    <h2>Option 4</h2>
    <p>Bordeaux prune</p>
    <p>#412038</p>
  </div>
</div>

<div class="block c5">
  <div class="inner">
    <h2>Option 5</h2>
    <p>Rouge acajou</p>
    <p>#4b2419</p>
  </div>
</div>

<div class="block c6">
  <div class="inner">
    <h2>Option 6</h2>
    <p>Lie-de-vin premium</p>
    <p>#351722</p>
  </div>
</div>

</body>
</html>
