<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Être contacté | LEVHEC ADVISORY</title>

  <style>
    *{
      box-sizing:border-box;
    }

    html, body{
      margin:0;
      padding:0;
    }

    body{
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
      background:#2b2b2b;
      color:#ece8df;
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:20px;
    }

    .container{
      width:100%;
      max-width:420px;
      background:#1f1f1f;
      padding:28px 22px 22px;
      border-radius:16px;
      box-shadow:0 20px 50px rgba(0,0,0,0.4);
    }

    h1{
      margin:0;
      text-align:center;
      line-height:1.25;
      font-size:26px;
      font-weight:600;
    }

    .subtitle{
      margin:10px 0 20px;
      text-align:center;
      color:#cfc8bb;
      font-size:14px;
      line-height:1.5;
    }

    form{
      display:flex;
      flex-direction:column;
      gap:12px;
    }

    input,
    textarea{
      width:100%;
      padding:14px;
      border-radius:10px;
      border:1px solid rgba(255,255,255,0.12);
      background:#2b2b2b;
      color:#ece8df;
      font-size:16px;
      font-family:inherit;
      appearance:none;
      -webkit-appearance:none;
    }

    input::placeholder,
    textarea::placeholder{
      color:#bfb7aa;
    }

    textarea{
      min-height:110px;
      resize:vertical;
    }

    input:focus,
    textarea:focus{
      outline:none;
      border-color:#c9a15d;
      box-shadow:0 0 0 3px rgba(201,161,93,0.12);
    }

    button,
    .btn{
      display:block;
      width:100%;
      margin-top:10px;
      padding:14px;
      border:none;
      border-radius:10px;
      background:#c9a15d;
      color:#ffffff;
      font-size:15px;
      font-weight:600;
      text-align:center;
      text-decoration:none;
      cursor:pointer;
      transition:all 0.2s ease;
    }

    button:hover,
    .btn:hover{
      filter:brightness(1.05);
    }

    .btn-secondary{
      background:#343434;
      border:1px solid rgba(255,255,255,0.1);
    }

    .back{
      display:block;
      margin-top:16px;
      text-align:center;
      font-size:13px;
      color:#cfc8bb;
      text-decoration:none;
    }

    .success-actions{
      display:flex;
      flex-direction:column;
      gap:12px;
      margin-top:22px;
    }

    @media (max-width: 480px){
      body{
        align-items:flex-start;
        padding:14px;
      }

      .container{
        max-width:100%;
        padding:24px 16px 18px;
        border-radius:14px;
        margin:0;
      }

      h1{
        font-size:23px;
      }

      .subtitle{
        font-size:14px;
      }

      input,
      textarea,
      button,
      .btn{
        font-size:16px;
      }
    }
  </style>
</head>

<body>

  <div class="container" id="contact-box">
    <h1>Être contacté par un consultant LEVHEC ADVISORY</h1>
    <p class="subtitle">Nous revenons vers vous rapidement.</p>

    <form action="https://api.web3forms.com/submit" method="POST">
      <input type="hidden" name="access_key" value="b1bae4e8-d6eb-4c38-94a8-09289895db0f">

      <input type="hidden" name="subject" value="Demande de contact LEVHEC">
      <input type="hidden" name="offre" id="offre">
      <input type="hidden" name="source_page" id="source_page">
      <input type="hidden" name="current_page" id="current_page">

      <input type="hidden" name="redirect" value="https://ads.levhec.com/contact/?success=1">

      <input type="text" name="nom" placeholder="Nom" autocomplete="name" required>
      <input type="text" name="entreprise" placeholder="Entreprise" autocomplete="organization">
      <input type="email" name="email" placeholder="E-mail" autocomplete="email" required>
      <input type="tel" name="telephone" placeholder="Téléphone" autocomplete="tel">
      <textarea name="message" placeholder="Votre besoin"></textarea>

      <button type="submit">Envoyer</button>
    </form>

    <a class="back" id="back-link" href="https://ads.levhec.com">← Retour</a>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const offreField = document.getElementById('offre');
    const sourcePageField = document.getElementById('source_page');
    const currentPageField = document.getElementById('current_page');
    const backLink = document.getElementById('back-link');
    const contactBox = document.getElementById('contact-box');

    const offreParam = params.get('offre');
    if (offreParam) {
      offreField.value = offreParam;
    }

    const referrer = document.referrer || "";
    sourcePageField.value = referrer || "direct";
    currentPageField.value = window.location.href;

    if (referrer) {
      backLink.href = referrer;
    } else {
      backLink.href = "https://ads.levhec.com";
    }

    if (params.get('success') === '1') {
      const returnUrl = referrer || "https://ads.levhec.com";

      contactBox.innerHTML = `
        <h1>Merci</h1>
        <p class="subtitle">Votre demande a bien été envoyée.</p>

        <div class="success-actions">
          <a class="btn btn-secondary" href="${returnUrl}">
            Retour à l’offre
          </a>

          <a class="btn" href="https://ads.levhec.com">
            Consulter les autres offres
          </a>

          <a class="btn" href="https://www.levhec-advisory.com" target="_blank" rel="noopener noreferrer">
            Découvrir le site LEVHEC Advisory
          </a>
        </div>
      `;
    }
  </script>

</body>
</html>
