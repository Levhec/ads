<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  background:transparent;
}

/* POPUP */
.popup-content{
  position:relative;
  background:#2b2b2b;
  color:#ece8df;
  padding:60px 25px 25px; /* espace pour la croix */
  border-radius:14px;
  max-width:500px;
  margin:auto;
  box-shadow:0 20px 60px rgba(0,0,0,.6);
  border:1px solid rgba(255,255,255,.08);
}

/* CROIX */
.popup-close{
  position:absolute;
  top:15px;
  right:15px;
  width:32px;
  height:32px;
  border:none;
  border-radius:50%;
  background:rgba(255,255,255,.08);
  color:#fff;
  font-size:18px;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
}

.popup-close:hover{
  background:rgba(255,255,255,.18);
}

/* TITRE */
.popup-content h2{
  margin:0 0 10px 0;
  text-align:center;
  font-size:26px;
}

/* TEXTE */
.popup-content p{
  text-align:center;
  color:#cfc8bb;
  margin-bottom:20px;
}

/* LABEL */
.popup-content label{
  display:block;
  margin-top:14px;
  font-size:13px;
  color:#cfc8bb;
}

/* INPUTS */
.popup-content input,
.popup-content textarea{
  width:100%;
  padding:12px;
  margin-top:6px;
  border-radius:8px;
  border:1px solid rgba(255,255,255,.15);
  background:#1f1f1f;
  color:#ece8df;
  font-size:14px;
  box-sizing:border-box;
  transition:all .2s ease;
}

/* FOCUS */
.popup-content input:focus,
.popup-content textarea:focus{
  outline:none;
  border:1px solid #c9a15d;
  background:#262626;
}

/* TEXTAREA */
.popup-content textarea{
  min-height:110px;
  resize:vertical;
}

/* BOUTON */
.popup-content button[type="submit"]{
  margin-top:20px;
  width:100%;
  padding:14px;
  background:#c9a15d;
  border:none;
  border-radius:10px;
  color:#1f1f1f;
  font-weight:600;
  font-size:15px;
  cursor:pointer;
  transition:all .2s ease;
}

.popup-content button[type="submit"]:hover{
  background:#d8b26a;
  transform:translateY(-1px);
}

/* MOBILE */
@media (max-width:600px){
  .popup-content{
    padding:55px 18px 20px;
  }

  .popup-content h2{
    font-size:22px;
  }
}
</style>
</head>

<body>

<div class="popup-content">

  <!-- CROIX (nécessaire car popup dans popup) -->
  <button class="popup-close" onclick="window.parent.closePopup()">×</button>

  <h2>Être contacté</h2>
  <p>Laissez-nous vos coordonnées. Nous reviendrons vers vous rapidement.</p>

  <form action="https://api.web3forms.com/submit" method="POST">
    <input type="hidden" name="access_key" value="b1bae4e8-d6eb-4c38-94a8-09289895db0f">
    <input type="hidden" name="subject" value="Demande contrôle de gestion LEVHEC">
    <input type="hidden" name="offre" value="Contrôle de gestion">
    <input type="hidden" name="page_url" id="page_url">

    <label for="nom">Nom</label>
    <input type="text" id="nom" name="nom" required>

    <label for="entreprise">Entreprise</label>
    <input type="text" id="entreprise" name="entreprise">

    <label for="email">Email</label>
    <input type="email" id="email" name="email" required>

    <label for="telephone">Téléphone</label>
    <input type="tel" id="telephone" name="telephone">

    <label for="message">Votre besoin</label>
    <textarea id="message" name="message" required></textarea>

    <button type="submit">Envoyer la demande</button>
  </form>

</div>

<script>
document.getElementById("page_url").value = document.referrer || window.location.href;
</script>

</body>
</html>
