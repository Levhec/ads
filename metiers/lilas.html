<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test Vert - Secrétaire Général</title>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  display:flex;
  height:100vh;
}

/* BLOCS */
.block{
  flex:1;
  display:flex;
  align-items:center;
  justify-content:center;
  color:#f4f1ea;
  text-align:center;
}

/* OPTION 1 — Vert profond élégant */
.vert1{
  background:
    linear-gradient(160deg, #0f2019 0%, #1f3d2f 50%, #2f5c47 100%);
}

/* OPTION 2 — Vert plus structuré (mon préféré) */
.vert2{
  background:
    linear-gradient(160deg, #0f221c 0%, #1f3f36 50%, #2f6a5a 100%);
}

/* OPTION 3 — Vert avec touche dorée (plus premium) */
.vert3{
  background:
    linear-gradient(160deg, #10231c 0%, #244a3d 50%, #3b7a65 100%);
}

h2{
  margin:0 0 10px;
  color:#d7b16b;
}

p{
  margin:0;
  opacity:0.85;
}
</style>

</head>
<body>

<div class="block vert1">
  <div>
    <h2>Option 1</h2>
    <p>Vert élégant</p>
  </div>
</div>

<div class="block vert2">
  <div>
    <h2>Option 2</h2>
    <p>Vert structurant</p>
  </div>
</div>

<div class="block vert3">
  <div>
    <h2>Option 3</h2>
    <p>Vert premium</p>
  </div>
</div>

</body>
</html>
