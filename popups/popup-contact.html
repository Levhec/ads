<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Contact | LEVHEC ADVISORY</title>

<style>

body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  background:transparent;
}

/* OVERLAY */
.popup-overlay{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* CONTENU */
.popup-content{
  position:relative;
  background:#2b2b2b;
  color:#ece8df;
  padding:30px;
  border-radius:16px;
  width:90%;
  max-width:520px;
  box-shadow:0 20px 50px rgba(0,0,0,.4);
}

/* CROIX UNIQUE */
.popup-close{
  position:absolute;
  top:12px;
  right:12px;
  width:36px;
  height:36px;
  border:none;
  border-radius:50%;
  background:rgba(255,255,255,0.1);
  color:#ece8df;
  font-size:20px;
  cursor:pointer;
}

.popup-close:hover{
  background:rgba(255,255,255,0.2);
}

/* TITRE */
.popup-content h2{
  margin-top:0;
  font-size:26px;
}

/* TEXTE */
.popup-content p{
  color:#cfc8bb;
  margin-bottom:20px;
}

/* FORMULAIRE */
label{
  display:block;
  margin-top:15px;
  font-size:14px;
}

input, textarea{
  width:100%;
  padding:12px;
  margin-top:5px;
  border-radius:8px;
  border:none;
  background:#3a3a3a;
  color:#ece8df;
  font-size:14px;
}

input:focus, textarea:focus{
  outline:1px solid #c9a15d;
}

/* BOUTON */
button[type="submit"]{
  width:100%;
  margin-top:20px;
  padding:14px;
  border:none;
  border-radius:10px;
  background:#c9a15d;
  color:#2b2b2b;
  font-size:16px;
  cursor:pointer;
  transition:all .2s ease;
}

button[type="submit"]:hover{
  background:#a88345;
}

/* MOBILE FIX */
@media (max-width:600px){
  .popup-content{
    padding:20px;
  }
}

</style>
</head>

<body>

<div class="popup-overlay">
  <div class="popup-content">

    <!-- SEULE CROIX -->
    <button class="popup-close" onclick="window.parent.closeIframePopup()">✕</button>

    <h2>Être contacté</h2>
    <p>Laissez-nous vos coordonnées. Nous reviendrons vers vous rapidement.</p>

    <form action="https://api.web3forms.com/submit" method="POST">

      <input type="hidden" name="access_key" value="b1bae4e8-d6eb-4c38-94a8-09289895db0f">
      <input type="hidden" name="subject" value="Demande LEVHEC Advisory">
      <input type="hidden" name="page_url" id="page_url">

      <label>Nom</label>
      <input type="text" name="nom" required>

      <label>Entreprise</label>
      <input type="text" name="entreprise">

      <label>Email</label>
      <input type="email" name="email" required>

      <label>Téléphone</label>
      <input type="tel" name="telephone">

      <label>Message</label>
      <textarea name="message" rows="4"></textarea>

      <button type="submit">Envoyer</button>

    </form>

  </div>
</div>

<script>
document.getElementById("page_url").value = document.referrer;
</script>

</body>
</html>
